<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <defs>
    <style>
      .box { fill: #f5f5f5; stroke: #333; stroke-width: 2; }
      .input { fill: #fff9c4; stroke: #f57f17; stroke-width: 1; }
      .decision { fill: #ffccbc; stroke: #e65100; stroke-width: 2; }
      .action { fill: #c8e6c9; stroke: #2e7d32; stroke-width: 1; }
      .block { fill: #ffcdd2; stroke: #c62828; stroke-width: 1; }
      .text { font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
      .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <text x="300" y="30" class="title" style="font-size: 20px;">Risk Gate Flow</text>

  <rect x="200" y="60" width="200" height="40" class="input" rx="5" />
  <text x="300" y="85" class="text">Signal + Confidence</text>

  <line x1="300" y1="100" x2="300" y2="130" class="arrow" />

  <rect x="200" y="130" width="200" height="40" class="input" rx="5" />
  <text x="300" y="155" class="text">Portfolio State</text>

  <line x1="300" y1="170" x2="300" y2="200" class="arrow" />

  <rect x="200" y="200" width="200" height="40" class="decision" rx="5" />
  <text x="300" y="225" class="text">Daily Loss Limit OK?</text>

  <line x1="300" y1="240" x2="300" y2="270" class="arrow" />
  <text x="310" y="260" class="text" style="font-size: 12px; text-anchor: start;">Yes</text>

  <line x1="400" y1="220" x2="500" y2="220" class="arrow" />
  <text x="410" y="215" class="text" style="font-size: 12px; text-anchor: start;">No</text>

  <rect x="500" y="200" width="80" height="40" class="block" rx="5" />
  <text x="540" y="225" class="text">BLOCK</text>

  <rect x="200" y="270" width="200" height="40" class="decision" rx="5" />
  <text x="300" y="295" class="text">Max Positions OK?</text>

  <line x1="300" y1="310" x2="300" y2="340" class="arrow" />
  <text x="310" y="330" class="text" style="font-size: 12px; text-anchor: start;">Yes</text>

  <line x1="400" y1="290" x2="500" y2="290" class="arrow" />
  <text x="410" y="285" class="text" style="font-size: 12px; text-anchor: start;">No</text>

  <rect x="500" y="270" width="80" height="40" class="block" rx="5" />
  <text x="540" y="295" class="text">BLOCK</text>

  <rect x="200" y="340" width="200" height="40" class="action" rx="5" />
  <text x="300" y="365" class="text">ALLOW + Position Size</text>

  <line x1="300" y1="380" x2="300" y2="410" class="arrow" />

  <rect x="200" y="410" width="200" height="40" class="action" rx="5" />
  <text x="300" y="435" class="text">Stop Loss / Take Profit</text>

</svg>
